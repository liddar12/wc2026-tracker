<!DOCTYPE html>
<html lang="en" data-redesign="v2">
<head>
<meta charset="utf-8">
<title>WC26 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="2026 FIFA World Cup matchup-level predictions, picks, and bracket tracker.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC26">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#1F4E78" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)">
<base id="app-base" href="/">
<script>
(function setBaseHref() {
  const parts = location.pathname.split('/').filter(Boolean);
  const last = parts[parts.length - 1];
  if (last && /\.[a-z0-9]+$/i.test(last)) parts.pop();
  const joinIndex = parts.indexOf('join');
  const prefix = joinIndex === -1 ? parts : parts.slice(0, joinIndex);
  const basePath = prefix.length ? '/' + prefix.join('/') + '/' : '/';
  const base = document.getElementById('app-base');
  if (base) base.href = basePath;
})();
(function markJoinRoute() {
  if (location.pathname.split('/').filter(Boolean).includes('join')) {
    document.documentElement.classList.add('wc26-join-route');
  }
})();
</script>
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css" crossorigin="anonymous" onload="document.documentElement.classList.add('has-flag-svg')" onerror="document.documentElement.classList.add('has-flag-emoji-only')">
<link rel="stylesheet" href="app/styles.css">
</head>
<body>
<!-- R10 a11y: skip-link is the FIRST focusable element on the page so keyboard
     users can jump past the header + tab-bar directly to main content. -->
<a href="#view" class="skip-link">Skip to main content</a>
<header class="app-header sticky-header" id="app-header" role="banner">
  <button class="back-btn" id="back-btn" type="button" aria-label="Back" hidden>&larr;</button>
  <h1 class="app-title" id="app-title" aria-label="WC26 Tracker">
    <img class="app-logo" src="assets/wc26/trionda-header-64.webp" alt="" aria-hidden="true" width="28" height="28" loading="eager" decoding="async">
    <!-- R13: route title removed — the active tab's underline indicator already
         tells users which section they're viewing. The logo alone serves as
         brand and is centered horizontally on the screen below. -->
  </h1>
  <div class="header-actions">
    <button class="auth-toolbar-btn" id="auth-toolbar-btn" type="button" aria-label="Account" data-testid="toolbar-account">
      <span class="auth-toolbar-icon" aria-hidden="true">&#128100;</span>
      <span class="auth-toolbar-label" id="auth-toolbar-label">Sign in</span>
    </button>
    <button class="settings-btn" id="settings-btn" type="button" aria-label="Settings">&#9881;</button>
  </div>
</header>
<div class="auth-toolbar-menu" id="auth-toolbar-menu" hidden role="dialog" aria-label="Account menu" data-testid="toolbar-account-menu"></div>

<div class="tab-bar-wrap" id="tab-bar-wrap">
<nav class="tab-bar" id="tab-bar" role="tablist" aria-label="Primary" data-testid="tab-bar">
  <button type="button" role="tab" data-route="home" class="tab is-active">Home</button>
  <button type="button" role="tab" data-route="schedule" class="tab" data-testid="tab-schedule">Schedule</button>
  <button type="button" role="tab" data-route="play" class="tab" data-testid="tab-play">Play</button>
  <button type="button" role="tab" data-route="bracket" class="tab" data-testid="tab-bracket">Bracket</button>
  <button type="button" role="tab" data-route="pools" class="tab" data-testid="tab-pools">Pools</button>
  <button type="button" role="tab" data-route="my-brackets" class="tab" data-testid="tab-my-brackets">My Brackets</button>
  <button type="button" role="tab" data-route="my-picks" class="tab" data-testid="tab-my-picks">My Picks</button>
  <button type="button" role="tab" data-route="venues" class="tab">Venues</button>
  <button type="button" role="tab" data-route="matches" class="tab">Matches</button>
</nav>
</div>

<main id="view" class="view scroll-area" role="main" aria-live="polite" aria-label="Main content" tabindex="-1" data-testid="view-root">
  <p class="loading">Loading data…</p>
</main>

<footer class="app-footer" role="contentinfo">
  <span id="data-version" class="muted" aria-label="Data last updated">—</span>
  <span class="muted">·</span>
  <span class="muted">v5-kalshi · WC26</span>
</footer>

<script src="app/preview-config.js"></script>
<script type="module" src="app/main.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
