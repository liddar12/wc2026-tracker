name: Live Tournament Update

on:
  schedule:
    # Every 15 minutes during tournament. Inner script gates by date window.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# Node 24 opt-in ahead of GitHub's June 16 forced default (mid-tournament).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  # SHARED data-writers group across all four data-writing crons (daily /
  # frequent / live / pre-kickoff). Serializing them eliminates the cross-cron
  # push race that let a rebase clobber a sibling's data (RCA bugs 4–5).
  # QUEUE, don't cancel: with ~3-4 min runs on a 15-min cadence plus GitHub's
  # scheduler drift, cancel-in-progress killed most runs BEFORE their commit
  # step — live results only landed every ~2h on June 12 (07:15/10:43/12:55).
  # Cancellation isn't failure(), so the watchdog never fired. Queued runs
  # execute back-to-back at worst.
  group: data-writers
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Gate to tournament window (2026-06-11 .. 2026-07-20)
        id: gate
        run: |
          today=$(date -u +%Y-%m-%d)
          start="2026-06-11"
          end="2026-07-20"
          if [[ "$today" < "$start" || "$today" > "$end" ]]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "manual run: proceeding even though $today is outside tournament window"
              echo "go=1" >> "$GITHUB_OUTPUT"
            else
              echo "skipping: $today is outside tournament window"
              echo "go=0" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "go=1" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.go == '1'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.go == '1'
        with:
          python-version: '3.11'
      - name: Install deps
        if: steps.gate.outputs.go == '1'
        run: pip install -r scripts/requirements.txt

      - name: Fetch live results (ESPN scoreboard)
        if: steps.gate.outputs.go == '1'
        run: python scripts/scrape_live_results.py
        continue-on-error: true
      # Legacy update_results.py step REMOVED: it wrote a conflicting record
      # schema (no `status` field, raw un-normalized ESPN team names, every
      # stage defaulted to group_stage) and ran AFTER scrape_live_results,
      # clobbering its normalized records — which broke status-gated scoring.
      # scrape_live_results.py is the single writer of actual_results.json.
      - name: Scrape top scorers (live)
        if: steps.gate.outputs.go == '1'
        run: python scripts/scrape_scorers.py
        continue-on-error: true
      - name: Scrape match events (goals + cards)
        if: steps.gate.outputs.go == '1'
        run: python scripts/scrape_match_events.py
        continue-on-error: true
      - name: Scrape lineups (in-game/post-game backfill)
        if: steps.gate.outputs.go == '1'
        run: python scripts/scrape_lineups.py
        continue-on-error: true
      - name: Scrape referees (assignments may change live)
        if: steps.gate.outputs.go == '1'
        run: python scripts/scrape_referees.py
        continue-on-error: true

      # R22: full-time boxscores right after a match goes FINAL, so the
      # dominance signal + AI recaps see fresh stats within one live cycle.
      - name: Scrape match boxscores (post-final)
        if: steps.gate.outputs.go == '1'
        run: python scripts/scrape_match_stats.py
        continue-on-error: true

      # P0-A1: results-driven Elo before composite so predictions move with the
      # live results this cron just scraped.
      - name: Compute results-driven Elo
        if: steps.gate.outputs.go == '1'
        run: python scripts/compute_elo.py
        continue-on-error: true
      - name: Compute in-tournament form signal
        if: steps.gate.outputs.go == '1'
        run: python scripts/compute_form.py
        continue-on-error: true
      # R22: dominance-MAX sub-rating refresh (weight optimizer-gated, daily).
      - name: Compute dominance-MAX signal
        if: steps.gate.outputs.go == '1'
        run: python scripts/compute_dominance.py
        continue-on-error: true
      - name: Recompute composite + probabilities
        if: steps.gate.outputs.go == '1'
        run: python scripts/rebuild_composite.py
      - name: Recompute xG
        if: steps.gate.outputs.go == '1'
        run: python scripts/compute_xg.py
      # Build knockout-stage matchup rows from the resolved bracket + xG. After
      # resolve_knockouts (run in the schedule crons) + compute_xg, before
      # validate (which gates knockout coverage in --strict mode).
      - name: Build knockout matchups
        if: steps.gate.outputs.go == '1'
        run: python scripts/build_knockout_matchups.py
        continue-on-error: true
      # scrape_kalshi REMOVED from the live cycle (it alone took ~45s of rate-
      # limited fetches): the hourly frequent_update refreshes markets.json and
      # build_hybrid blends whatever's latest. Shorter runs = no more overlap.
      - name: Rebuild DT model (Elo + market value blend)
        if: steps.gate.outputs.go == '1'
        run: python scripts/build_dt_model.py
        continue-on-error: true
      - name: Rebuild hybrid forecast (1/3 J5L + DT + Kalshi)
        if: steps.gate.outputs.go == '1'
        run: python scripts/build_hybrid.py
        continue-on-error: true
      - name: Rebuild stacker (J5L AI Enhanced blend, weight re-fit from results)
        if: steps.gate.outputs.go == '1'
        run: python scripts/build_stacker.py
        continue-on-error: true
      - name: Capture + score live backtest (4 models + Kalshi + Polymarket)
        if: steps.gate.outputs.go == '1'
        run: python scripts/snapshot_backtest.py
        continue-on-error: true
      # R18: self-tune the in-play engine's red-card multipliers from played
      # goal/red timelines (never-regress) so live-match picks keep learning.
      - name: Recalibrate conformal safe sets (R20)
        if: steps.gate.outputs.go == '1'
        run: python scripts/build_conformal.py
        continue-on-error: true
      - name: Self-tune in-play engine params (red multipliers)
        if: steps.gate.outputs.go == '1'
        run: python scripts/tune_inplay.py
        continue-on-error: true

      - name: Validate refreshed data
        if: steps.gate.outputs.go == '1'
        run: python3 scripts/validate_data.py --strict

      - name: Commit and push
        if: steps.gate.outputs.go == '1'
        run: |
          git config user.name "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
          else
            git commit -m "chore: live results update"
            # PLAIN 'git pull --rebase' (no '-X theirs'): live results are the
            # most important payload, and '-X theirs' silently DISCARDED a
            # sibling cron's data on overlap (RCA 4–5). The data-writers
            # concurrency group already serializes the crons; on a genuine
            # conflict, re-run the deterministic generators and re-stage data/.
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n retries"; exit 1; fi
              if ! git pull --rebase origin main; then
                git rebase --abort || true
                git reset --hard origin/main
                python scripts/scrape_live_results.py || true
                python scripts/rebuild_composite.py || true
                python scripts/build_knockout_matchups.py || true
                python scripts/build_hybrid.py || true
                python scripts/build_stacker.py || true
                python scripts/compute_xg.py || true
                git add data/
                git commit -m "chore: live results update (reconciled)" || true
                sleep 5
              fi
            done
          fi

      # 100%-automation watchdog: a silent pipeline failure froze live data on
      # tournament day. Any failed run now files a labeled GitHub issue (and
      # the Actions email notification fires) instead of dying quietly.
      - name: Alert on failure (GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"🔴 live_update FAILED — live scores frozen (run ${{ github.run_id }})\",\"body\":\"The 15-min live results cron failed. Scores/leaderboards are stale until this is fixed.\\n\\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"labels\":[\"pipeline-alert\"]}" \
            > /dev/null || true
