name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'     # 06:00 UTC daily, all year
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# Opt into Node 24 ahead of GitHub's June 16 forced default (checkout@v4 /
# setup-python@v5 are compatible; this silences the deprecation warning and
# removes the mid-tournament surprise).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# SINGLE cross-workflow concurrency group shared by all four data-writing crons
# (daily / frequent / live / pre-kickoff). They all commit to data/ on main, so
# serializing them here means only one runs at a time — eliminating the
# push-race window where a rebase clobbered a sibling cron's just-committed data
# (RCA bugs 4–5). cancel-in-progress:false queues runs instead of dropping them.
concurrency:
  group: data-writers
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r scripts/requirements.txt

      # ---- Daily-cadence Wikipedia team kit colors refresh ----
      - name: Refresh team colors (Wikipedia + curated overrides)
        run: python scripts/scrape_team_colors_wiki.py
        continue-on-error: true

      # ---- Phase 1 scrapers (composite + roster + ratings) ----
      - name: Scrape Elo
        run: python scripts/update_elo.py
        continue-on-error: true
      - name: Scrape ESPN
        run: python scripts/update_espn.py
        continue-on-error: true
      - name: Scrape Transfermarkt (Mondays only)
        run: |
          if [ "$(date -u +%u)" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/update_tmv.py
          else
            echo "Skipping Transfermarkt — not Monday."
          fi
        continue-on-error: true
      - name: Scrape squad / injury news
        run: python scripts/update_squads.py
        continue-on-error: true

      # ---- Phase 2 scrapers (schedule + referees + h2h + form + weather) ----
      - name: Scrape FIFA schedule
        run: python scripts/scrape_schedule.py
        continue-on-error: true
      # ESPN is the authoritative kickoff-time source (scrape_schedule's FIFA
      # feed is robots-blocked). This corrects any seed/feed date drift — it
      # caught 3 group games dated 24h early on June 13.
      - name: Reconcile kickoff times from ESPN
        run: python scripts/reconcile_schedule.py
        continue-on-error: true
      # Once the group stage ends, ESPN publishes the resolved knockout fixtures.
      # reconcile only re-times REAL-team matches (it skips placeholders), so this
      # fills bracket slots (1A/2B/W74/3 ABCDF) with the actual qualified teams —
      # otherwise the schedule + knockout pages freeze on placeholders (RCA 6/28).
      - name: Resolve knockout fixtures from ESPN
        run: python scripts/resolve_knockouts.py
        continue-on-error: true
      - name: Fill US broadcast / streaming per match
        run: python scripts/scrape_broadcast.py
        continue-on-error: true
      - name: Scrape referees
        run: python scripts/scrape_referees.py
        continue-on-error: true
      - name: Scrape head-to-head history
        run: python scripts/scrape_h2h.py
        continue-on-error: true
      - name: Scrape recent form
        run: python scripts/scrape_form.py
        continue-on-error: true
      - name: Scrape weather (Open-Meteo)
        run: python scripts/scrape_weather.py
        continue-on-error: true

      # Live results: refresh here too so the daily run also reconciles scores
      # (defense-in-depth against */15 live_update throttling).
      - name: Scrape live results
        run: python scripts/scrape_live_results.py
        continue-on-error: true

      # ---- Composite + analytics rebuild (must succeed) ----
      # Kalshi FIRST: build_hybrid blends markets.json, so the scrape must
      # precede the model rebuilds (was after them — the 06:00 hybrid was
      # blended from the previous run's odds).
      - name: Scrape Kalshi markets
        run: python scripts/scrape_kalshi.py
        continue-on-error: true
      # P0-A1: results-driven Elo (from actual_results) BEFORE composite, so the
      # model moves game-to-game instead of sitting on frozen pre-tournament Elo.
      - name: Compute results-driven Elo
        run: python scripts/compute_elo.py
        continue-on-error: true
      - name: Compute in-tournament form signal
        run: python scripts/compute_form.py
        continue-on-error: true
      # R22: boxscores + dominance-MAX BEFORE the optimizer, so the daily
      # walk-forward fit sees a fresh signal when deciding its (gated) weight.
      - name: Scrape match boxscores (post-final)
        run: python scripts/scrape_match_stats.py
        continue-on-error: true
      - name: Compute dominance-MAX signal
        run: python scripts/compute_dominance.py
        continue-on-error: true
      # Daily-only: re-fit composite weights + Poisson + hybrid blend to minimize
      # walk-forward log-loss on games played (never-regress guarded).
      - name: Optimize model weights (backtest-tuned)
        run: python scripts/optimize_weights.py
        continue-on-error: true
      - name: Recompute composite + probabilities
        run: python scripts/rebuild_composite.py
      - name: Rebuild DT model (Elo + market value blend)
        run: python scripts/build_dt_model.py
        continue-on-error: true
      - name: Rebuild hybrid forecast (1/3 J5L + DT + Kalshi)
        run: python scripts/build_hybrid.py
        continue-on-error: true
      - name: Rebuild stacker (J5L AI Enhanced blend, weight re-fit from results)
        run: python scripts/build_stacker.py
        continue-on-error: true
      - name: Compute fatigue + travel
        run: python scripts/compute_fatigue.py
      - name: Compute model xG
        run: python scripts/compute_xg.py
      # Build the knockout-stage matchup rows (data/knockout_matchups.json) from
      # the resolved bracket + xG. Must run AFTER resolve_knockouts (fills the
      # bracket slots) and compute_xg (provides the knockout xG keys) and BEFORE
      # validate (which gates on knockout coverage in --strict mode).
      - name: Build knockout matchups
        run: python scripts/build_knockout_matchups.py
        continue-on-error: true

      # RJ30.1-D: AI match previews/recaps. Runs AFTER the model rebuild so the
      # prompt sees fresh probs, BEFORE validate. Ships DORMANT — with no
      # ANTHROPIC_API_KEY secret it logs "unset", exits 0, and leaves
      # previews.json untouched. continue-on-error so an API hiccup never reds
      # the daily refresh.
      - name: Generate AI match previews/recaps (dormant without key)
        run: python3 scripts/generate_previews.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Validate refreshed data
        run: python3 scripts/validate_data.py --strict

      # P0-A2: alert if model inputs (teams/players) stop moving mid-tournament.
      # Non-blocking (always exits 0); opens a deduped stale-data issue.
      - name: Staleness watchdog (model inputs)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/check_staleness.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
          else
            git commit -m "chore: daily data refresh"
            # The data-writers concurrency group serializes the four crons, so a
            # push race is rare; the rebase+retry is just belt-and-suspenders.
            # PLAIN 'git pull --rebase' (no '-X theirs'): '-X theirs' silently
            # DISCARDED the sibling cron's just-committed data on any overlap
            # (RCA bugs 4–5). A genuine conflict instead re-runs the
            # deterministic generators so both crons' inputs are reconciled
            # before we re-stage only data/ and retry.
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n retries"; exit 1; fi
              if ! git pull --rebase origin main; then
                git rebase --abort || true
                # Reconcile against the freshly-pulled sibling data, then
                # regenerate our deterministic outputs on top of it.
                git reset --hard origin/main
                python3 scripts/rebuild_composite.py || true
                python3 scripts/build_knockout_matchups.py || true
                python3 scripts/build_hybrid.py || true
                python3 scripts/build_stacker.py || true
                python3 scripts/compute_xg.py || true
                git add data/
                git commit -m "chore: daily data refresh (reconciled)" || true
                sleep 5
              fi
            done
          fi

      # Watchdog: a failed daily refresh files a labeled issue (parity with
      # live/frequent — this workflow previously only failed via email).
      - name: Alert on failure (GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"🟠 daily_update FAILED (run ${{ github.run_id }})\",\"body\":\"The 06:00 daily refresh failed.\\n\\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"labels\":[\"pipeline-alert\"]}" \
            > /dev/null || true
