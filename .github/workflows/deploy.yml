name: CI checks
# Was previously "Deploy to GitHub Pages" — site is now hosted on Netlify
# with auto-CD from main, so the Pages deploy was redundant and was failing
# every push (Pages not enabled on this repo). Repurposed as a CI gate that
# runs validate_data + smoke + tests on every push so we still catch data
# regressions before Netlify auto-deploys.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-checks
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r scripts/requirements.txt
      - name: Validate data
        run: python3 scripts/validate_data.py
      - name: Smoke test (static shape checks)
        run: bash tests/smoke.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Competition tests
        run: node tests/competition.test.mjs
      # R14: the CI gate previously ran ONLY tests/competition.test.mjs, so 7
      # feature suites + the UX/integrated Playwright suites never gated the
      # auto-deploy. Run the full feature suite here; the browser suites run
      # in a separate job below.
      - name: Feature test suite
        run: node --test tests/feature/*.mjs

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm ci || npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: UX + integrated suites
        run: npx playwright test --config tests/playwright.config.mjs tests/ux tests/integrated
