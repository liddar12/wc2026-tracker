name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate data
        run: python3 scripts/validate_data.py
      - name: Smoke test (local server)
        run: bash tests/smoke.sh
      - uses: actions/configure-pages@v5
      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Exclude scripts/, .github/, and Python artifacts from the deployed site.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
