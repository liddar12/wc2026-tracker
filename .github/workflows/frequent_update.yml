name: Frequent Data Refresh

# Refreshes the volatile, fan-facing datasets — player ratings/injuries, team
# ratings, and power rankings — far more often than the once-a-day
# daily_update.yml job.
#
# Cadence: cron '17 * * * *' fires once per hour (at :17 to dodge the
# top-of-the-hour scheduling congestion GitHub is prone to dropping) =>
# 24 runs/day, comfortably above the >=20/day target.
#
# IMPORTANT: GitHub Actions only runs `schedule:` triggers from the default
# branch (main). On this feature branch the file is inert — it does nothing
# until merged to main. workflow_dispatch lets you trial it manually from any
# branch once it lands.

on:
  schedule:
    - cron: '17 * * * *'   # hourly at :17 UTC => 24 runs/day
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# Node 24 opt-in ahead of GitHub's June 16 forced default (mid-tournament).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# SINGLE cross-workflow concurrency group shared by all four data-writing crons
# (daily / frequent / live / pre-kickoff). Serializing them eliminates the
# cross-cron push race that let a rebase clobber a sibling's data (RCA bugs 4–5).
concurrency:
  group: data-writers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r scripts/requirements.txt

      # ---- Team + power-ranking inputs (best-effort; never fail the build) ----
      - name: Scrape Elo ratings
        run: python scripts/update_elo.py
        continue-on-error: true
      - name: Scrape ESPN / FIFA power rankings
        run: python scripts/update_espn.py
        continue-on-error: true

      # ---- Player + injury data ----
      - name: Scrape squad / injury news (inline player flags)
        run: python scripts/update_squads.py
        continue-on-error: true
      # Injuries: ESPN (empty for WC) + API-Football when APIFOOTBALL_KEY is set.
      # The scraper self-throttles the API-Football call to ≤1 fetch / 6h, so
      # this hourly step costs ~4 API-Football requests/day (free tier = 100/day).
      - name: Build dedicated injuries feed
        run: python scripts/scrape_injuries.py
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        continue-on-error: true

      # ---- Schedule (mjwebmaster open feed, no API key) ----
      - name: Refresh tournament schedule from open feed
        run: python scripts/scrape_schedule.py
        continue-on-error: true
      # Authoritative kickoff-time correction from ESPN (hourly self-heal).
      - name: Reconcile kickoff times from ESPN
        run: python scripts/reconcile_schedule.py
        continue-on-error: true
      # Fill knockout bracket slots (1A/2B/W74/3 ABCDF) with the actual qualified
      # teams from ESPN's resolved fixtures — reconcile skips placeholders, so
      # without this the schedule + knockout pages freeze on placeholders (RCA 6/28).
      - name: Resolve knockout fixtures from ESPN
        run: python scripts/resolve_knockouts.py
        continue-on-error: true
      - name: Fill US broadcast / streaming per match
        run: python scripts/scrape_broadcast.py
        continue-on-error: true

      # Live results FLOOR: GitHub throttles the */15 live_update cron hard
      # (it fired only ~every 3-5h on June 16), so final scores lagged hours.
      # Running the results scrape here too means the canonical feed is at most
      # ~1h stale even when */15 is dropped entirely. Idempotent + status-gated.
      - name: Scrape live results (reliable hourly floor)
        run: python scripts/scrape_live_results.py
        continue-on-error: true

      # ---- Volatile market + venue data (Kalshi, weather, lineups) ----
      - name: Scrape Kalshi tournament-winner markets
        run: python scripts/scrape_kalshi.py
        continue-on-error: true
      - name: Scrape venue weather forecast
        run: python scripts/scrape_weather.py
        continue-on-error: true
      - name: Scrape projected lineups
        run: python scripts/scrape_lineups.py
        continue-on-error: true
      - name: Scrape match events (goals + cards)
        run: python scripts/scrape_match_events.py
        continue-on-error: true
      # R22: full-time boxscores (possession/shots/SoT) — feeds the dominance-MAX
      # signal + stats-aware AI recaps. Idempotent; skips matches already stored.
      - name: Scrape match boxscores (post-final)
        run: python scripts/scrape_match_stats.py
        continue-on-error: true

      # ---- Recompute composite + power_rank from refreshed inputs ----
      # P0-A1: results-driven Elo first so composite reflects games played.
      - name: Compute results-driven Elo
        run: python scripts/compute_elo.py
        continue-on-error: true
      - name: Compute in-tournament form signal
        run: python scripts/compute_form.py
        continue-on-error: true
      # R22: dominance-MAX sub-rating (peak boxscore dominance). Weight stays 0
      # until the DAILY optimizer adopts it (never-regress) — this step only
      # keeps the signal fresh.
      - name: Compute dominance-MAX signal
        run: python scripts/compute_dominance.py
        continue-on-error: true
      - name: Recompute composite + power rankings
        run: python scripts/rebuild_composite.py
        continue-on-error: true
      - name: Recompute model xG (Golden Boot scoring environment)
        run: python scripts/compute_xg.py
        continue-on-error: true
      # Build knockout-stage matchup rows from the resolved bracket + xG. After
      # resolve_knockouts + compute_xg, before validate (which gates coverage).
      - name: Build knockout matchups
        run: python scripts/build_knockout_matchups.py
        continue-on-error: true
      - name: Rebuild DT model (Elo + market value blend)
        run: python scripts/build_dt_model.py
        continue-on-error: true
      - name: Rebuild hybrid forecast (1/3 J5L + DT + Kalshi)
        run: python scripts/build_hybrid.py
        continue-on-error: true
      - name: Rebuild stacker (J5L AI Enhanced blend, weight re-fit from results)
        run: python scripts/build_stacker.py
        continue-on-error: true
      - name: Capture live backtest snapshots (4 models + Kalshi + Polymarket)
        run: python scripts/snapshot_backtest.py
        continue-on-error: true
      # R18: self-tune the in-play engine's red-card multipliers from played
      # goal/red timelines (never-regress; writes only on a real change, so
      # no-op runs commit nothing). Composite-weight re-fitting stays DAILY-ONLY
      # by design (model-optimizer.test.mjs) — hourly re-fits would churn
      # meta.json commits and displayed probabilities for fits the never-regress
      # margin rarely adopts.
      - name: Recalibrate conformal safe sets (R20)
        run: python scripts/build_conformal.py
        continue-on-error: true
      - name: Self-tune in-play engine params (red multipliers)
        run: python scripts/tune_inplay.py
        continue-on-error: true

      # RJ30.1-D: AI match previews/recaps. Runs AFTER the model rebuild so the
      # prompt sees fresh probs, BEFORE the version bump/validate so a fresh
      # previews.json is committed. Ships DORMANT — with no ANTHROPIC_API_KEY it
      # logs "unset", exits 0, leaves previews.json untouched. The skip-if-
      # unchanged content hash keeps hourly cost near-zero; continue-on-error so
      # an API hiccup never reds the hourly refresh.
      # R23: derive knockout rest/travel context BEFORE previews so a final-four
      # preview can ground a fatigue/freshness angle in real numbers. Offline,
      # pure stdlib, anti-churn (no commit when nothing changed).
      - name: Build knockout rest/travel context
        run: python3 scripts/build_ko_context.py
        continue-on-error: true
      - name: Generate AI match previews/recaps (dormant without key)
        run: python3 scripts/generate_previews.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      # ---- Bump meta.data_version ONLY when real data changed ----
      # Was unconditional: every hourly run committed + pushed + redeployed even
      # with zero data changes, maximizing the cross-cron push-race window and
      # burning a Netlify deploy per hour for nothing.
      - name: Bump meta.data_version (only if data changed)
        run: |
          # Content-aware: only bump when a NON-meta data file actually changed,
          # so a no-op hourly run stops committing+pushing and burning a Netlify
          # deploy for nothing (RCA bug 10). Inline python3 -c (replaces the
          # prior heredoc) writes ensure_ascii=True to match data/*.json encoding.
          if [ -n "$(git status --porcelain data/ | grep -v 'data/meta.json' || true)" ]; then
            python3 -c "import json,datetime,pathlib; p=pathlib.Path('data/meta.json'); m=json.loads(p.read_text()); m['data_version']=datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%S+00:00'); p.write_text(json.dumps(m, ensure_ascii=True, indent=2)+'\n'); print('meta.data_version ->', m['data_version'])"
          else
            git checkout -- data/meta.json 2>/dev/null || true
            echo "No real data changes — skipping version bump."
          fi

      - name: Validate refreshed data
        run: python3 scripts/validate_data.py --strict

      - name: Commit and push
        run: |
          git config user.name "wc26-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
          else
            git commit -m "chore: frequent data refresh (players/injuries/teams/power-rank/kalshi/weather/lineups)"
            # PLAIN 'git pull --rebase' (no '-X theirs'): the data-writers
            # concurrency group already serializes the crons; '-X theirs'
            # silently discarded a sibling cron's data on overlap (RCA 4–5). A
            # genuine conflict re-runs the deterministic generators and re-stages
            # only data/ so neither cron's inputs are lost.
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 3 ]; then echo "push failed after $n retries"; exit 1; fi
              if ! git pull --rebase origin main; then
                git rebase --abort || true
                git reset --hard origin/main
                python3 scripts/rebuild_composite.py || true
                python3 scripts/build_knockout_matchups.py || true
                python3 scripts/build_hybrid.py || true
                python3 scripts/build_stacker.py || true
                python3 scripts/compute_xg.py || true
                git add data/
                git commit -m "chore: frequent data refresh (reconciled)" || true
                sleep 5
              fi
            done
          fi

      # Watchdog: failed hourly refresh files a labeled issue instead of dying silently.
      - name: Alert on failure (GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"🟠 frequent_update FAILED (run ${{ github.run_id }})\",\"body\":\"The hourly data/model refresh failed.\\n\\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"labels\":[\"pipeline-alert\"]}" \
            > /dev/null || true
